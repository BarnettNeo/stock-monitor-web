# 本地开发用 MySQL（与根目录 .env 默认 DB_NAME / DB_USER / DB_PASSWORD 对齐）
# 启动：在项目根目录执行
#   docker compose -f docker-compose.mysql.yml up -d
# 停止：docker compose -f docker-compose.mysql.yml down
# 数据卷：stock_monitor_mysql_data

services:
  mysql:
    image: mysql:8.0
    container_name: stock-monitor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootchangeme
      MYSQL_DATABASE: stock_monitor
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - stock_monitor_mysql_data:/var/lib/mysql

volumes:
  stock_monitor_mysql_data:
